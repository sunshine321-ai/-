spring.application.name=microcourse-backend
# Load the shared project .env whether the app is launched from the repository
# root or from this Maven module (for example, by an IDE).
spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]
server.port=8000

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/microcourse?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:123456}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

mybatis.configuration.map-underscore-to-camel-case=true

app.storage.root=${STORAGE_ROOT:storage}
app.ai.api-key=${DASHSCOPE_API_KEY:}
app.ai.base-url=${DASHSCOPE_CHAT_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
app.ai.text-model=${QWEN_MODEL:qwen-plus}
app.ai.vision-model=${QWEN_VISION_MODEL:qwen-vl-plus}
